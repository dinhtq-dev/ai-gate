<link rel="stylesheet" href="components/section-upload-config.css">
<!-- Upload Configuration Section -->
<section id="upload-config" class="section" aria-labelledby="upload-config-title">
    <h2 id="upload-config-title" data-i18n="upload.title">Quản lý file xác thực</h2>
    <div class="upload-config-panel">
        <div class="config-list-container">
            <!-- Toolbar -->
            <div class="config-list-toolbar">
                <div class="config-list-toolbar__head">
                    <h3 data-i18n="upload.listTitle">Danh sách file cấu hình</h3>
                    <div class="config-list-toolbar__actions">
                        <button class="btn btn-secondary btn-toolbar" id="refreshConfigList" type="button" aria-label="Refresh Config List" data-i18n-aria-label="upload.refresh">
                            <i class="fas fa-sync-alt"></i> <span data-i18n="upload.refresh">Làm mới</span>
                        </button>
                        <button class="btn btn-secondary btn-toolbar" id="downloadAllConfigs" type="button" aria-label="Download All Configs" data-i18n-aria-label="upload.downloadAll">
                            <i class="fas fa-file-archive"></i> <span data-i18n="upload.downloadAll">Tải tất cả (ZIP)</span>
                        </button>
                    </div>
                </div>

                <div class="config-stats-chips">
                    <div class="config-stat-chip">
                        <span class="config-stat-chip__value" id="configCountValue">0</span>
                        <span class="config-stat-chip__label">Tổng</span>
                    </div>
                    <div class="config-stat-chip config-stat-chip--linked">
                        <span class="config-stat-chip__value" id="usedConfigCountValue">0</span>
                        <span class="config-stat-chip__label" data-i18n="upload.statusFilter.used">Đã liên kết</span>
                    </div>
                    <div class="config-stat-chip config-stat-chip--unlinked">
                        <span class="config-stat-chip__value" id="unusedConfigCountValue">0</span>
                        <span class="config-stat-chip__label" data-i18n="upload.statusFilter.unused">Chưa liên kết</span>
                    </div>
                </div>

                <div class="config-filter-bar">
                    <div class="config-filter-bar__search">
                        <i class="fas fa-search config-filter-bar__search-icon" aria-hidden="true"></i>
                        <input type="text" id="configSearch" class="form-control" data-i18n-placeholder="upload.searchPlaceholder" placeholder="Nhập tên file">
                    </div>
                    <select id="configProviderFilter" class="form-control config-filter-bar__select">
                        <option value="" data-i18n="upload.providerFilter.all">Tất cả nhà cung cấp</option>
                    </select>
                    <select id="configStatusFilter" class="form-control config-filter-bar__select">
                        <option value="" data-i18n="upload.statusFilter.all">Tất cả trạng thái</option>
                        <option value="used" data-i18n="upload.statusFilter.used">Đã liên kết</option>
                        <option value="unused" data-i18n="upload.statusFilter.unused">Chưa liên kết</option>
                    </select>
                    <button type="button" class="btn btn-primary btn-filter-search" id="searchConfigBtn" data-i18n-title="common.search" data-i18n-aria-label="common.search" aria-label="Tìm kiếm">
                        <i class="fas fa-search"></i>
                    </button>
                </div>

                <div class="config-bulk-bar">
                    <button id="batchLinkKiroBtn" class="btn btn-secondary btn-bulk" type="button" data-i18n-title="upload.batchLink" title="Tự động liên kết OAuth">
                        <i class="fas fa-link"></i> <span data-i18n="upload.batchLink">Tự động liên kết OAuth</span>
                    </button>
                    <button id="deleteUnboundBtn" class="btn btn-danger-outline btn-bulk" type="button" data-i18n-title="upload.deleteUnbound" title="Xóa chưa liên kết">
                        <i class="fas fa-trash-alt"></i> <span data-i18n="upload.deleteUnbound">Xóa chưa liên kết</span>
                    </button>
                </div>
            </div>

            <div id="configList" class="config-list config-list-cards">
                <!-- 配置文件列表将在这里动态生成 -->
            </div>
        </div>
    </div>
</section>
